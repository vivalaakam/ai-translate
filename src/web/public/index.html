<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Translate — EPUB/FB2 Book Translator</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242837;
      --border: #2e3347;
      --text: #e4e6f0;
      --text2: #9499b3;
      --accent: #6c5ce7;
      --accent2: #a29bfe;
      --green: #00b894;
      --red: #e17055;
      --yellow: #fdcb6e;
      --blue: #74b9ff;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 720px;
      width: 100%;
      padding: 24px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 40px 0 32px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p {
      color: var(--text2);
      font-size: 15px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--accent);
      color: white;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(108, 92, 231, 0.05);
    }
    .drop-zone .icon { font-size: 40px; margin-bottom: 12px; }
    .drop-zone .label { color: var(--text2); font-size: 14px; }
    .drop-zone .label strong { color: var(--accent2); }
    .drop-zone input[type="file"] { display: none; }
    .file-info {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text2);
    }
    .file-info.visible { display: flex; align-items: center; gap: 8px; }
    .file-info .name { flex: 1; color: var(--text); word-break: break-all; }

    /* Form */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group select, .form-group input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group select:focus, .form-group input:focus {
      border-color: var(--accent);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-green {
      background: var(--green);
      color: white;
    }

    /* Book list */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-header h2 { font-size: 18px; font-weight: 600; }

    .book-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .book-card:hover { border-color: var(--accent); }
    .book-card.completed { border-color: var(--green); }
    .book-card.translating { border-color: var(--accent); }

    .book-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .book-title {
      font-weight: 600;
      font-size: 15px;
      flex: 1;
      margin-right: 12px;
    }
    .book-author {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 10px;
    }
    .book-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 10px;
    }
    .book-stats span { display: flex; align-items: center; gap: 4px; }

    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar .fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .progress-bar .fill.completed { background: var(--green); }
    .progress-bar .fill.failed { background: var(--red); }

    .book-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-sm {
      padding: 5px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-sm:hover { opacity: 0.8; }
    .btn-translate { background: var(--accent); color: white; }
    .btn-download { background: var(--green); color: white; }
    .btn-delete { background: var(--surface2); color: var(--text2); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
      font-size: 14px;
    }

    /* API status */
    .api-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 20px;
    }
    .api-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text2);
    }
    .api-dot.ok { background: var(--green); }
    .api-dot.err { background: var(--red); }

    /* Translate modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 480px;
    }
    .modal h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .modal .book-info {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 16px;
    }

    /* Status badge */
    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .status-badge.queued { background: var(--surface2); color: var(--text2); }
    .status-badge.parsing { background: rgba(253, 203, 110, 0.15); color: var(--yellow); }
    .status-badge.translating { background: rgba(108, 92, 231, 0.15); color: var(--accent2); }
    .status-badge.assembling { background: rgba(253, 203, 110, 0.15); color: var(--yellow); }
    .status-badge.completed { background: rgba(0, 184, 148, 0.15); color: var(--green); }
    .status-badge.failed { background: rgba(225, 112, 85, 0.15); color: var(--red); }

    .job-message { font-size: 12px; color: var(--text2); }

    @media (max-width: 500px) {
      .form-row { grid-template-columns: 1fr; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📚 AI Translate</h1>
      <p>Translate EPUB &amp; FB2 books — formatting preserved</p>
    </div>

    <div class="api-status" id="apiStatus">
      <div class="api-dot" id="apiDot"></div>
      <span id="apiText">Checking API…</span>
    </div>

    <!-- Tabs: Upload / Library -->
    <div class="tabs">
      <button class="tab active" data-tab="upload" onclick="switchTab('upload')">📤 Upload</button>
      <button class="tab" data-tab="library" onclick="switchTab('library')">📖 Library</button>
    </div>

    <!-- Upload tab -->
    <div id="uploadTab">
      <div class="card">
        <form id="uploadForm">
          <div class="drop-zone" id="dropZone">
            <div class="icon">📄</div>
            <div class="label"><strong>Click to upload</strong> or drag &amp; drop your EPUB/FB2 file</div>
            <input type="file" id="fileInput" accept=".epub,.fb2" required>
          </div>
          <div class="file-info" id="fileInfo">
            <span>📎</span>
            <span class="name" id="fileName"></span>
          </div>

          <div class="form-row" id="translateOptions" style="display:none">
            <div class="form-group">
              <label>Source Language</label>
              <select id="sourceLang">
                <option value="auto">Auto-detect</option>
                <option value="en">English</option>
                <option value="ru">Russian</option>
                <option value="de">German</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="zh">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
              </select>
            </div>
            <div class="form-group">
              <label>Target Language *</label>
              <select id="targetLang" required>
                <option value="">Select…</option>
                <option value="ru">Russian</option>
                <option value="en">English</option>
                <option value="de">German</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="zh">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
              </select>
            </div>
          </div>

          <div class="form-row" id="modelRow" style="display:none">
            <div class="form-group full">
              <label>Model</label>
              <select id="modelSelect">
                <option value="">Loading models…</option>
              </select>
            </div>
          </div>

          <div class="btn-row">
            <button type="submit" class="btn btn-secondary" id="uploadBtn">📤 Upload Only</button>
            <button type="button" class="btn btn-primary" id="translateBtn" disabled>🚀 Upload &amp; Translate</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Library tab -->
    <div id="libraryTab" style="display:none">
      <div class="section-header">
        <h2>Books</h2>
        <span id="bookCount" style="font-size:13px;color:var(--text2)"></span>
      </div>
      <div id="bookList">
        <div class="empty-state" id="bookEmpty">No books yet — upload one to get started</div>
      </div>
    </div>
  </div>

  <!-- Translate modal -->
  <div class="modal-overlay" id="translateModal">
    <div class="modal">
      <h3>🌐 Translate Book</h3>
      <div class="book-info" id="modalBookInfo"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Source Language</label>
          <select id="modalSourceLang">
            <option value="auto">Auto-detect</option>
            <option value="en">English</option>
            <option value="ru">Russian</option>
            <option value="de">German</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
          </select>
        </div>
        <div class="form-group">
          <label>Target Language *</label>
          <select id="modalTargetLang" required>
            <option value="">Select…</option>
            <option value="ru">Russian</option>
            <option value="en">English</option>
            <option value="de">German</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
          </select>
        </div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-group full">
          <label>Model</label>
          <select id="modalModel">
            <option value="">Loading models…</option>
          </select>
        </div>
      </div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-green" id="modalTranslateBtn" disabled onclick="startTranslateFromModal()">🚀 Start Translation</button>
      </div>
    </div>
  </div>

  <script>
    // ─── State ────────────────────────────────────────────────
    let selectedFile = null;
    let ws = null;
    let reconnectTimer = null;
    let appConfig = { uploadOnly: false, defaultModel: '', defaultProvider: '' };
    let currentBookId = null;
    let models = [];

    // ─── DOM refs ────────────────────────────────────────────
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const uploadForm = document.getElementById('uploadForm');
    const uploadBtn = document.getElementById('uploadBtn');
    const translateBtn = document.getElementById('translateBtn');
    const translateOptions = document.getElementById('translateOptions');
    const modelRow = document.getElementById('modelRow');
    const sourceLang = document.getElementById('sourceLang');
    const targetLang = document.getElementById('targetLang');
    const modelSelect = document.getElementById('modelSelect');
    const apiDot = document.getElementById('apiDot');
    const apiText = document.getElementById('apiText');
    const bookList = document.getElementById('bookList');
    const bookEmpty = document.getElementById('bookEmpty');

    // ─── Tabs ────────────────────────────────────────────────
    window.switchTab = function(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
      document.getElementById('uploadTab').style.display = tab === 'upload' ? '' : 'none';
      document.getElementById('libraryTab').style.display = tab === 'library' ? '' : 'none';
      if (tab === 'library') loadBooks();
    };

    // ─── File selection ──────────────────────────────────────
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      if (ext !== 'epub' && ext !== 'fb2') {
        alert('Only .epub and .fb2 files are supported');
        return;
      }
      selectedFile = file;
      fileName.textContent = file.name;
      fileInfo.classList.add('visible');

      // Show translate options when file is selected
      translateOptions.style.display = '';
      if (!appConfig.uploadOnly) modelRow.style.display = '';
      updateBtnState();
    }

    // ─── API check ──────────────────────────────────────────
    async function initApp() {
      // Load config
      try {
        const res = await fetch('/api/config');
        if (res.ok) appConfig = await res.json();
      } catch {}

      // Check models API
      try {
        const res = await fetch('/api/models');
        if (!res.ok) throw new Error();
        const data = await res.json();
        models = data.models || [];

        apiDot.className = 'api-dot ok';
        apiText.textContent = `API connected — ${models.length} model(s)`;

        populateModelSelect(modelSelect);
        populateModelSelect(document.getElementById('modalModel'));
        updateBtnState();
      } catch {
        apiDot.className = 'api-dot err';
        apiText.textContent = 'API not available';
        modelSelect.innerHTML = '<option value="">API unavailable</option>';
        document.getElementById('modalModel').innerHTML = '<option value="">API unavailable</option>';
      }

      // If uploadOnly, hide translate button
      if (appConfig.uploadOnly) {
        translateBtn.style.display = 'none';
        modelRow.style.display = 'none';
      }
    }
    initApp();

    function populateModelSelect(sel) {
      sel.innerHTML = '';
      if (models.length === 0) {
        sel.innerHTML = '<option value="">No models found</option>';
        return;
      }
      models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        if (m === appConfig.defaultModel) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    // ─── Form state ─────────────────────────────────────────
    targetLang.addEventListener('change', updateBtnState);

    function updateBtnState() {
      const hasFile = !!selectedFile;
      uploadBtn.disabled = !hasFile;
      translateBtn.disabled = !hasFile || !targetLang.value || (modelSelect.options.length > 0 && !modelSelect.value);
    }

    // ─── Upload Only ────────────────────────────────────────
    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedFile) return;

      const formData = new FormData();
      formData.append('file', selectedFile);

      uploadBtn.disabled = true;
      translateBtn.disabled = true;
      uploadBtn.textContent = '⏳ Uploading…';

      try {
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (res.ok) {
          resetForm();
          // Switch to library
          switchTab('library');
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'subscribe', jobId: data.jobId }));
          }
        } else {
          alert(data.error || 'Upload failed');
        }
      } catch (err) {
        alert('Upload error: ' + err.message);
      }
      uploadBtn.textContent = '📤 Upload Only';
      updateBtnState();
    });

    // ─── Upload & Translate ─────────────────────────────────
    translateBtn.addEventListener('click', async () => {
      if (!selectedFile || !targetLang.value) return;

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('sourceLang', sourceLang.value);
      formData.append('targetLang', targetLang.value);
      formData.append('model', modelSelect.value);

      uploadBtn.disabled = true;
      translateBtn.disabled = true;
      translateBtn.textContent = '⏳ Starting…';

      try {
        const res = await fetch('/api/translate', { method: 'POST', body: formData });
        const data = await res.json();

        if (res.ok) {
          resetForm();
          switchTab('library');
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'subscribe', jobId: data.jobId }));
          }
        } else {
          alert(data.error || 'Failed to start translation');
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
      translateBtn.textContent = '🚀 Upload & Translate';
      updateBtnState();
    });

    function resetForm() {
      selectedFile = null;
      fileInput.value = '';
      fileInfo.classList.remove('visible');
      translateOptions.style.display = 'none';
      modelRow.style.display = 'none';
      targetLang.value = '';
    }

    // ─── Books / Library ────────────────────────────────────
    async function loadBooks() {
      try {
        const res = await fetch('/api/books');
        if (!res.ok) return;
        const data = await res.json();
        const books = data.books || [];

        document.getElementById('bookCount').textContent = `${books.length} book(s)`;

        if (books.length === 0) {
          bookEmpty.style.display = '';
          return;
        }
        bookEmpty.style.display = 'none';

        bookList.querySelectorAll('.book-card').forEach(el => el.remove());

        books.forEach(book => renderBookCard(book));
      } catch {}
    }

    function renderBookCard(book) {
      let el = document.getElementById('book-' + book.id);
      if (!el) {
        el = document.createElement('div');
        el.id = 'book-' + book.id;
        bookList.prepend(el);
      }

      const total = book.totalBlocks || 0;
      const translated = book.translatedBlocks || 0;
      const pct = total > 0 ? Math.round((translated / total) * 100) : 0;
      const isComplete = book.completedAt !== null;
      const isTranslating = translated > 0 && !isComplete;

      let statusBadge = '';
      if (isComplete) {
        statusBadge = '<span class="status-badge completed">✓ done</span>';
      } else if (isTranslating) {
        statusBadge = '<span class="status-badge translating">translating</span>';
      } else {
        statusBadge = '<span class="status-badge queued">parsed</span>';
      }

      let actions = '';
      if (!isComplete) {
        actions += `<button class="btn-sm btn-translate" onclick="openTranslateModal('${book.id}', '${escapeAttr(book.title)}', '${escapeAttr(book.author)}')">🌐 Translate</button>`;
      }
      actions += `<button class="btn-sm btn-delete" onclick="deleteBook('${book.id}')">✕</button>`;

      const progressBar = translated > 0 ? `
        <div class="progress-bar">
          <div class="fill ${isComplete ? 'completed' : ''}" style="width:${pct}%"></div>
        </div>` : '';

      el.className = `book-card ${isComplete ? 'completed' : isTranslating ? 'translating' : ''}`;
      el.innerHTML = `
        <div class="book-top">
          <div class="book-title">${escapeHtml(book.title || book.filename)}</div>
          ${statusBadge}
        </div>
        <div class="book-author">${escapeHtml(book.author || 'Unknown author')}</div>
        ${progressBar}
        <div class="book-stats">
          <span>📄 ${total} blocks</span>
          <span>✅ ${translated} translated</span>
          <span>🌍 ${book.language || '?'}</span>
          ${book.targetLang ? `<span>→ ${book.targetLang}</span>` : ''}
        </div>
        <div class="book-actions">${actions}</div>
      `;
    }

    // ─── Translate Modal ────────────────────────────────────
    window.openTranslateModal = function(bookId, title, author) {
      currentBookId = bookId;
      document.getElementById('modalBookInfo').textContent = `${title} by ${author}`;
      document.getElementById('translateModal').classList.add('visible');
      document.getElementById('modalTargetLang').value = '';
      updateModalBtn();
    };

    window.closeModal = function() {
      document.getElementById('translateModal').classList.remove('visible');
      currentBookId = null;
    };

    document.getElementById('modalTargetLang').addEventListener('change', updateModalBtn);

    function updateModalBtn() {
      const btn = document.getElementById('modalTranslateBtn');
      const sel = document.getElementById('modalModel');
      btn.disabled = !document.getElementById('modalTargetLang').value || (sel.options.length > 0 && !sel.value);
    }

    window.startTranslateFromModal = async function() {
      if (!currentBookId) return;
      const tLang = document.getElementById('modalTargetLang').value;
      const sLang = document.getElementById('modalSourceLang').value;
      const model = document.getElementById('modalModel').value;

      try {
        const res = await fetch(`/api/books/${currentBookId}/translate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ targetLang: tLang, sourceLang: sLang, model }),
        });
        const data = await res.json();

        if (res.ok) {
          closeModal();
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'subscribe', jobId: data.jobId }));
          }
          loadBooks();
        } else {
          alert(data.error || 'Failed to start translation');
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    };

    window.deleteBook = async function(id) {
      if (!confirm('Delete this book and all its data?')) return;
      try {
        await fetch(`/api/books/${id}`, { method: 'DELETE' });
      } catch {}
      const el = document.getElementById('book-' + id);
      if (el) el.remove();
    };

    // ─── WebSocket ───────────────────────────────────────────
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);

      ws.addEventListener('open', () => {
        clearTimeout(reconnectTimer);
      });

      ws.addEventListener('message', (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'job:update') {
          // Refresh book list on any job update
          if (document.getElementById('libraryTab').style.display !== 'none') {
            loadBooks();
          }
        }
        if (msg.type === 'jobs:list') {
          // Initial jobs list — not used in new UI
        }
      });

      ws.addEventListener('close', () => {
        reconnectTimer = setTimeout(connectWS, 3000);
      });
    }
    connectWS();

    // ─── Helpers ────────────────────────────────────────────
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }
    function escapeAttr(str) {
      return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
